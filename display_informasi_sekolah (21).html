<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Informasi Sekolah</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: 'Plus Jakarta Sans', sans-serif; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1.5s ease-in-out; display: flex; align-items: center; justify-content: center; }
        .slide.active { opacity: 1; z-index: 1; }
        .ticker-wrap { overflow: hidden; width: 100%; position: relative; }
        .ticker-move { display: inline-block; white-space: nowrap; animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translate(100%, 0); } 100% { transform: translate(-100%, 0); } }
        .admin-modal { display: none; }
        .admin-active .admin-modal { display: flex; }
        .admin-active .display-view { display: none; }
        .header-gradient { background: linear-gradient(90deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden" id="body-theme">

    <div id="app" class="h-full w-full">
        <div id="display-view" class="display-view h-full flex flex-col">
            <header id="main-header" class="header-gradient p-4 flex justify-between items-center shadow-lg text-white">
                <div class="flex items-center gap-4">
                    <img id="main-logo" src="" alt="Logo" class="w-16 h-16 object-contain" onerror="this.src='https://placehold.co/80x80/transparent/transparent?text=🏫'">
                    <div class="flex flex-col justify-center">
                        <div class="text-[10px] font-bold opacity-80 uppercase tracking-[0.2em]">Display Informasi Sekolah</div>
                        <h1 id="masjid-name" class="text-2xl font-black uppercase tracking-tight">Nama Sekolah Anda</h1>
                    </div>
                </div>
                <div class="text-right flex flex-col items-end">
                    <div id="date-display" class="text-xs font-bold opacity-90 mb-0.5"></div>
                    <div id="clock" class="text-3xl font-mono font-bold tracking-tighter">00:00:00</div>
                </div>
            </header>

            <div class="flex-1 flex overflow-hidden bg-white">
                <div id="slideshow-container" class="flex-1 relative bg-gray-100 overflow-hidden">
                    <button onclick="toggleAdmin()" class="absolute bottom-4 right-4 text-xl z-50 opacity-30 hover:opacity-100 transition-opacity cursor-pointer bg-white/50 p-2 rounded-full shadow-md">⚙️</button>
                </div>
                
                <div class="w-80 bg-gray-50 p-6 flex flex-col border-l border-gray-200 overflow-y-auto">
                    <h2 class="text-xs font-bold text-gray-900 border-b border-gray-200 pb-2 mb-4 uppercase tracking-wider">Jadwal Kegiatan</h2>
                    <div id="schedule-container" class="space-y-4">
                        <div id="row1"><div id="date1" class="text-[10px] font-bold text-blue-600 uppercase tracking-wider">--/--</div><div id="event1" class="text-sm font-semibold text-gray-800">--</div></div>
                        <div id="row2"><div id="date2" class="text-[10px] font-bold text-blue-600 uppercase tracking-wider">--/--</div><div id="event2" class="text-sm font-semibold text-gray-800">--</div></div>
                        <div id="row3"><div id="date3" class="text-[10px] font-bold text-blue-600 uppercase tracking-wider">--/--</div><div id="event3" class="text-sm font-semibold text-gray-800">--</div></div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-6 gap-px border-t border-gray-200 bg-gray-200">
                <div class="bg-indigo-700 flex flex-col items-center justify-center text-white py-3">
                    <span class="text-[11px] font-bold opacity-90 uppercase tracking-widest">SUBUH</span>
                    <span class="text-2xl font-black" id="time-subuh">00:00</span>
                </div>
                <div class="bg-amber-600 flex flex-col items-center justify-center text-white py-3">
                    <span class="text-[11px] font-bold opacity-90 uppercase tracking-widest">TERBIT</span>
                    <span class="text-2xl font-black" id="time-terbit">00:00</span>
                </div>
                <div class="bg-blue-700 flex flex-col items-center justify-center text-white py-3">
                    <span class="text-[11px] font-bold opacity-90 uppercase tracking-widest">DZUHUR</span>
                    <span class="text-2xl font-black" id="time-dzuhur">00:00</span>
                </div>
                <div class="bg-emerald-700 flex flex-col items-center justify-center text-white py-3">
                    <span class="text-[11px] font-bold opacity-90 uppercase tracking-widest">ASHAR</span>
                    <span class="text-2xl font-black" id="time-ashar">00:00</span>
                </div>
                <div class="bg-orange-700 flex flex-col items-center justify-center text-white py-3">
                    <span class="text-[11px] font-bold opacity-90 uppercase tracking-widest">MAGRIB</span>
                    <span class="text-2xl font-black" id="time-magrib">00:00</span>
                </div>
                <div class="bg-purple-800 flex flex-col items-center justify-center text-white py-3">
                    <span class="text-[11px] font-bold opacity-90 uppercase tracking-widest">ISYA</span>
                    <span class="text-2xl font-black" id="time-isya">00:00</span>
                </div>
            </div>

            <footer class="bg-gray-100 p-4 flex items-center border-t border-gray-200">
                <div class="bg-blue-600 text-white font-bold px-3 py-1 rounded text-sm mr-4 shrink-0 shadow-sm uppercase tracking-wider">INFO</div>
                <div class="ticker-wrap flex-1 text-gray-900 font-bold text-2xl"><div class="ticker-move" id="news-ticker">Selamat Datang di Sekolah Kami.</div></div>
            </footer>
        </div>

        <div id="admin-panel" class="admin-modal absolute inset-0 bg-gray-50 p-10 flex-col overflow-y-auto z-50">
            <h2 class="text-3xl font-bold mb-8 text-gray-900 border-b border-gray-200 pb-4">Admin Dashboard</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                    <h3 class="font-bold text-lg mb-4 text-blue-600">Identitas</h3>
                    <input type="text" id="admin-name" class="w-full p-2 bg-gray-50 rounded border border-gray-300 mb-4" placeholder="Nama Sekolah">
                    <input type="file" id="logo-upload" accept="image/png" class="w-full p-2 bg-gray-50 rounded border border-gray-300">
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                    <h3 class="font-bold text-lg mb-4 text-blue-600">Jadwal</h3>
                    <div class="flex gap-2 mb-2"><input type="text" id="admin-date1" class="w-1/3 p-2 bg-gray-50 rounded border border-gray-300" placeholder="Tgl"><input type="text" id="admin-e1" class="w-2/3 p-2 bg-gray-50 rounded border border-gray-300" placeholder="Kegiatan"></div>
                    <div class="flex gap-2 mb-2"><input type="text" id="admin-date2" class="w-1/3 p-2 bg-gray-50 rounded border border-gray-300" placeholder="Tgl"><input type="text" id="admin-e2" class="w-2/3 p-2 bg-gray-50 rounded border border-gray-300" placeholder="Kegiatan"></div>
                    <div class="flex gap-2"><input type="text" id="admin-date3" class="w-1/3 p-2 bg-gray-50 rounded border border-gray-300" placeholder="Tgl"><input type="text" id="admin-e3" class="w-2/3 p-2 bg-gray-50 rounded border border-gray-300" placeholder="Kegiatan"></div>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-200 shadow-sm md:col-span-2">
                    <h3 class="font-bold text-lg mb-4 text-blue-600">Manajemen Slide</h3>
                    <input type="file" id="file-upload" multiple accept="image/*" class="w-full p-2 bg-gray-50 rounded border border-gray-300 mb-4">
                    <div id="slide-management-list" class="grid grid-cols-6 gap-2 mt-4"></div>
                    <input type="text" id="admin-ticker" class="w-full p-2 bg-gray-50 rounded border border-gray-300 mt-4" placeholder="Teks Berjalan">
                </div>
            </div>
            <div class="mt-8 flex gap-4">
                <button onclick="saveSettings()" class="bg-blue-600 px-8 py-3 rounded-lg font-bold hover:bg-blue-700 text-white shadow-lg">Simpan & Kembali</button>
            </div>
        </div>
    </div>

    <script>
        const DB_NAME = 'SchoolDisplayDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'slides';

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function getAllSlides() {
            const db = await openDB();
            return new Promise(resolve => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result || []);
            });
        }

        async function compressImage(file, maxWidth = 800) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * (img.width > maxWidth ? scale : 1);
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/png'));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function init() {
            document.getElementById('masjid-name').innerText = localStorage.getItem('masjidName') || 'Nama Sekolah Anda';
            document.getElementById('admin-name').value = localStorage.getItem('masjidName') || '';
            document.getElementById('event1').innerText = localStorage.getItem('e1') || '--';
            document.getElementById('event2').innerText = localStorage.getItem('e2') || '--';
            document.getElementById('event3').innerText = localStorage.getItem('e3') || '--';
            document.getElementById('admin-e1').value = localStorage.getItem('e1') || '';
            document.getElementById('admin-e2').value = localStorage.getItem('e2') || '';
            document.getElementById('admin-e3').value = localStorage.getItem('e3') || '';
            document.getElementById('date1').innerText = localStorage.getItem('d1') || '--/--';
            document.getElementById('date2').innerText = localStorage.getItem('d2') || '--/--';
            document.getElementById('date3').innerText = localStorage.getItem('d3') || '--/--';
            document.getElementById('admin-date1').value = localStorage.getItem('d1') || '';
            document.getElementById('admin-date2').value = localStorage.getItem('d2') || '';
            document.getElementById('admin-date3').value = localStorage.getItem('d3') || '';
            document.getElementById('news-ticker').innerText = localStorage.getItem('tickerText') || 'Selamat Datang di Sekolah Kami.';
            document.getElementById('admin-ticker').value = localStorage.getItem('tickerText') || '';
            
            const savedLogo = localStorage.getItem('logo');
            if(savedLogo) document.getElementById('main-logo').src = savedLogo;
            
            refreshSlides();
            fetchPrayerTimes();
            updateClock();
        }

        async function refreshSlides() {
            let slides = await getAllSlides();
            
            // FOTO AWAL DIATUR KE 'sekolah.png' JIKA DATABASE KOSONG
            if (slides.length === 0) {
                slides = [
                    {
                        image: 'sekolah.png',
                        caption: 'Selamat Datang di Sekolah Kami'
                    }
                ];
            }
            
            renderSlides(slides);
            renderAdminSlideList(slides);
        }

        function renderSlides(slides) {
            const container = document.getElementById('slideshow-container');
            const oldSlides = container.querySelectorAll('.slide');
            oldSlides.forEach(s => s.remove());

            if (slides.length === 0) {
                container.innerHTML += `<div class="absolute inset-0 flex items-center justify-center text-gray-400 font-bold">Belum ada foto</div>`;
                return;
            }

            slides.forEach((slide, index) => {
                const d = document.createElement('div');
                d.className = `slide ${index === 0 ? 'active' : ''}`;
                d.innerHTML = `
                    <img src="${slide.image}" class="w-full h-full object-cover">
                    ${slide.caption ? `<div class="absolute bottom-6 left-6 bg-black/70 text-white p-3 rounded-lg shadow-lg w-fit max-w-[40%]"><p class="text-sm font-bold">${slide.caption}</p></div>` : ''}
                `;
                container.appendChild(d);
            });
        }

        function renderAdminSlideList(slides) {
            const container = document.getElementById('slide-management-list');
            container.innerHTML = '';
            
            if (slides.length === 1 && slides[0].image === 'sekolah.png') {
                container.innerHTML = `<p class="text-xs text-gray-400 col-span-6">Menampilkan foto awal bawaan (sekolah.png)</p>`;
                return;
            }

            slides.forEach(slide => {
                const div = document.createElement('div');
                div.className = 'p-1 bg-gray-100 rounded border border-gray-200';
                div.innerHTML = `
                    <img src="${slide.image}" class="w-full aspect-square object-cover rounded mb-1">
                    <input type="text" placeholder="Ket..." class="w-full p-1 border rounded text-[10px]" value="${slide.caption || ''}" onchange="updateCaption(${slide.id}, this.value)">
                    <button onclick="deleteSlide(${slide.id})" class="w-full mt-1 bg-red-500 text-white text-[9px] py-0.5 rounded">Hapus</button>
                `;
                container.appendChild(div);
            });
        }

        async function updateCaption(id, val) {
            const db = await openDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            const req = store.get(id);
            req.onsuccess = () => {
                const data = req.result;
                data.caption = val;
                store.put(data);
            };
        }

        async function deleteSlide(id) {
            const db = await openDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.delete(id);
            tx.oncomplete = () => refreshSlides();
        }

        async function fetchPrayerTimes() {
            try {
                const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Jakarta&country=Indonesia&method=11`);
                const data = await res.json();
                const t = data.data.timings;
                document.getElementById('time-subuh').innerText = t.Fajr;
                document.getElementById('time-terbit').innerText = t.Sunrise;
                document.getElementById('time-dzuhur').innerText = t.Dhuhr;
                document.getElementById('time-ashar').innerText = t.Asr;
                document.getElementById('time-magrib').innerText = t.Maghrib;
                document.getElementById('time-isya').innerText = t.Isha;
            } catch(e) { console.error('Error', e); }
        }

        document.getElementById('file-upload').addEventListener('change', async (e) => {
            const files = e.target.files;
            if(!files.length) return;
            const images = [];
            for (let i = 0; i < files.length; i++) {
                const compressed = await compressImage(files[i]);
                images.push(compressed);
            }
            const db = await openDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            images.forEach(img => store.add({ image: img, caption: '' }));
            tx.oncomplete = () => refreshSlides();
        });

        document.getElementById('logo-upload').addEventListener('change', async (e) => {
            if(!e.target.files.length) return;
            const compressed = await compressImage(e.target.files[0], 200);
            localStorage.setItem('logo', compressed);
            document.getElementById('main-logo').src = compressed;
        });

        function saveSettings() {
            localStorage.setItem('masjidName', document.getElementById('admin-name').value);
            localStorage.setItem('e1', document.getElementById('admin-e1').value);
            localStorage.setItem('e2', document.getElementById('admin-e2').value);
            localStorage.setItem('e3', document.getElementById('admin-e3').value);
            localStorage.setItem('d1', document.getElementById('admin-date1').value);
            localStorage.setItem('d2', document.getElementById('admin-date2').value);
            localStorage.setItem('d3', document.getElementById('admin-date3').value);
            localStorage.setItem('tickerText', document.getElementById('admin-ticker').value);
            window.location.reload();
        }

        function toggleAdmin() { document.getElementById('app').classList.toggle('admin-active'); }
        
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
            document.getElementById('date-display').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }

        setInterval(updateClock, 1000);
        setInterval(() => {
            const slides = document.querySelectorAll('.slide');
            if(slides.length <= 1) return;
            const current = Array.from(slides).findIndex(s => s.classList.contains('active'));
            slides[current].classList.remove('active');
            slides[(current + 1) % slides.length].classList.add('active');
        }, 8000);

        window.onload = init;
    </script>
</body>
</html>
